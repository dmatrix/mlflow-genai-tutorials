<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- Kurzgesagt-style soft gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="supervisorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c73e54"/>
    </linearGradient>
    <linearGradient id="genieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a5276"/>
    </linearGradient>
    <linearGradient id="kaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#533483"/>
      <stop offset="100%" style="stop-color:#6c3d9e"/>
    </linearGradient>
    <linearGradient id="synthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e97c00"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48c9b0"/>
      <stop offset="100%" style="stop-color:#1abc9c"/>
    </linearGradient>
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#2ecc71;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:0.15"/>
    </linearGradient>
    <!-- Glow effects -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="subtleShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)" rx="16"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="700" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="700" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="700" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="700" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="700" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative circles (Kurzgesagt-style background elements) -->
  <circle cx="80" cy="120" r="40" fill="#e94560" opacity="0.06"/>
  <circle cx="1120" cy="580" r="55" fill="#48c9b0" opacity="0.06"/>
  <circle cx="150" cy="600" r="30" fill="#f5a623" opacity="0.05"/>
  <circle cx="1050" cy="100" r="35" fill="#533483" opacity="0.07"/>
  <circle cx="600" cy="50" r="25" fill="#0f3460" opacity="0.08"/>

  <!-- Small decorative dots -->
  <circle cx="300" cy="80" r="3" fill="#e94560" opacity="0.15"/>
  <circle cx="900" cy="630" r="3" fill="#48c9b0" opacity="0.15"/>
  <circle cx="100" cy="400" r="2" fill="#f5a623" opacity="0.12"/>
  <circle cx="1100" cy="350" r="2" fill="#533483" opacity="0.12"/>

  <!-- MLflow Tracing backdrop strip -->
  <rect x="30" y="85" width="1140" height="530" rx="18" fill="url(#traceGrad)" stroke="#2ecc71" stroke-width="1" stroke-opacity="0.12"/>
  <text x="55" y="110" fill="#2ecc71" font-size="11" font-weight="600" opacity="0.5" letter-spacing="2">MLflow TRACING</text>

  <!-- ============ USER QUERY (top) ============ -->
  <g filter="url(#softShadow)">
    <rect x="440" y="108" width="320" height="62" rx="31" fill="url(#userGrad)"/>
  </g>
  <!-- User icon -->
  <circle cx="480" cy="139" r="14" fill="none" stroke="#fff" stroke-width="2.5"/>
  <circle cx="480" cy="133" r="5.5" fill="#fff"/>
  <path d="M469 148 c0-6 5-10.5 11-10.5 s11 4.5 11 10.5" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <text x="505" y="144" fill="#fff" font-size="17" font-weight="700">User Query</text>

  <!-- Arrow: User -> Supervisor -->
  <line x1="600" y1="172" x2="600" y2="210" stroke="#48c9b0" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <polygon points="592,208 600,222 608,208" fill="#48c9b0" opacity="0.7"/>

  <!-- ============ SUPERVISOR (center) ============ -->
  <g filter="url(#softShadow)">
    <rect x="380" y="225" width="440" height="90" rx="18" fill="url(#supervisorGrad)"/>
  </g>
  <!-- Brain/routing icon -->
  <g transform="translate(415, 258)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#fff" stroke-width="2" opacity="0.9"/>
    <circle cx="-5" cy="-3" r="3" fill="#fff" opacity="0.8"/>
    <circle cx="5" cy="-3" r="3" fill="#fff" opacity="0.8"/>
    <circle cx="0" cy="5" r="3" fill="#fff" opacity="0.8"/>
    <line x1="-5" y1="-3" x2="5" y2="-3" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <line x1="-5" y1="-3" x2="0" y2="5" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <line x1="5" y1="-3" x2="0" y2="5" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="445" y="264" fill="#fff" font-size="22" font-weight="700">Supervisor Router</text>
  <text x="445" y="290" fill="#fff" font-size="13" opacity="0.75">LLM Classification  |  Route  |  Delegate  |  Synthesize</text>

  <!-- Route labels on arrows -->
  <!-- Arrow: Supervisor -> Genie (left) -->
  <path d="M480 317 Q420 355 320 380" stroke="#4fc3f7" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <polygon points="323,373 314,383 326,385" fill="#4fc3f7" opacity="0.6"/>
  <rect x="355" y="338" width="65" height="22" rx="11" fill="#4fc3f7" opacity="0.15"/>
  <text x="370" y="354" fill="#4fc3f7" font-size="11" font-weight="600">"genie"</text>

  <!-- Arrow: Supervisor -> KA (right) -->
  <path d="M720 317 Q780 355 880 380" stroke="#bb86fc" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <polygon points="877,373 886,383 874,385" fill="#bb86fc" opacity="0.6"/>
  <rect x="775" y="338" width="45" height="22" rx="11" fill="#bb86fc" opacity="0.15"/>
  <text x="785" y="354" fill="#bb86fc" font-size="11" font-weight="600">"ka"</text>

  <!-- Arrow: Supervisor -> Both (center, splits) -->
  <line x1="600" y1="317" x2="600" y2="355" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <rect x="567" y="338" width="66" height="22" rx="11" fill="#f5a623" opacity="0.15"/>
  <text x="578" y="354" fill="#f5a623" font-size="11" font-weight="600">"both"</text>
  <path d="M600 358 Q540 378 320 395" stroke="#f5a623" stroke-width="1.5" fill="none" stroke-dasharray="6,4" stroke-linecap="round" opacity="0.35"/>
  <path d="M600 358 Q660 378 880 395" stroke="#f5a623" stroke-width="1.5" fill="none" stroke-dasharray="6,4" stroke-linecap="round" opacity="0.35"/>

  <!-- ============ GENIE AGENT (left) ============ -->
  <g filter="url(#softShadow)">
    <rect x="110" y="390" width="330" height="110" rx="16" fill="url(#genieGrad)"/>
  </g>
  <!-- Database icon -->
  <g transform="translate(150, 425)">
    <ellipse cx="0" cy="-8" rx="14" ry="6" fill="none" stroke="#4fc3f7" stroke-width="2"/>
    <path d="M-14 -8 L-14 8" stroke="#4fc3f7" stroke-width="2"/>
    <path d="M14 -8 L14 8" stroke="#4fc3f7" stroke-width="2"/>
    <ellipse cx="0" cy="8" rx="14" ry="6" fill="none" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  </g>
  <text x="178" y="423" fill="#fff" font-size="18" font-weight="700">Genie Agent</text>
  <text x="178" y="445" fill="#4fc3f7" font-size="12" font-weight="500">Structured Data Queries</text>
  <!-- Sub-items -->
  <g transform="translate(145, 462)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#4fc3f7" opacity="0.5"/>
    <text x="14" y="8" fill="#fff" font-size="11" opacity="0.7">JSON Query Spec</text>
    <rect x="130" y="0" width="8" height="8" rx="2" fill="#4fc3f7" opacity="0.5"/>
    <text x="144" y="8" fill="#fff" font-size="11" opacity="0.7">Pandas DataFrame</text>
  </g>
  <g transform="translate(145, 480)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#4fc3f7" opacity="0.5"/>
    <text x="14" y="8" fill="#fff" font-size="11" opacity="0.7">Filter / GroupBy / Agg</text>
  </g>

  <!-- ============ KA AGENT (right) ============ -->
  <g filter="url(#softShadow)">
    <rect x="760" y="390" width="330" height="110" rx="16" fill="url(#kaGrad)"/>
  </g>
  <!-- Document icon -->
  <g transform="translate(800, 425)">
    <rect x="-10" y="-14" width="20" height="26" rx="3" fill="none" stroke="#bb86fc" stroke-width="2"/>
    <line x1="-5" y1="-6" x2="5" y2="-6" stroke="#bb86fc" stroke-width="1.5" opacity="0.6"/>
    <line x1="-5" y1="-1" x2="5" y2="-1" stroke="#bb86fc" stroke-width="1.5" opacity="0.6"/>
    <line x1="-5" y1="4" x2="3" y2="4" stroke="#bb86fc" stroke-width="1.5" opacity="0.6"/>
  </g>
  <text x="828" y="423" fill="#fff" font-size="18" font-weight="700">Knowledge Assistant</text>
  <text x="828" y="445" fill="#bb86fc" font-size="12" font-weight="500">Document Retrieval &amp; Policy Q&amp;A</text>
  <!-- Sub-items -->
  <g transform="translate(795, 462)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#bb86fc" opacity="0.5"/>
    <text x="14" y="8" fill="#fff" font-size="11" opacity="0.7">Semantic Search</text>
    <rect x="120" y="0" width="8" height="8" rx="2" fill="#bb86fc" opacity="0.5"/>
    <text x="134" y="8" fill="#fff" font-size="11" opacity="0.7">Embeddings</text>
  </g>
  <g transform="translate(795, 480)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#bb86fc" opacity="0.5"/>
    <text x="14" y="8" fill="#fff" font-size="11" opacity="0.7">FEMA Policy Corpus</text>
  </g>

  <!-- Arrows: Agents -> Synthesizer -->
  <path d="M275 502 Q320 540 470 560" stroke="#4fc3f7" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <polygon points="467,553 475,563 470,551" fill="#4fc3f7" opacity="0.5"/>
  <path d="M925 502 Q880 540 730 560" stroke="#bb86fc" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <polygon points="733,553 725,563 730,551" fill="#bb86fc" opacity="0.5"/>

  <!-- ============ SYNTHESIZER (bottom) ============ -->
  <g filter="url(#softShadow)">
    <rect x="420" y="548" width="360" height="62" rx="16" fill="url(#synthGrad)"/>
  </g>
  <!-- Merge icon -->
  <g transform="translate(458, 579)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#fff" stroke-width="2" opacity="0.8"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#fff" stroke-width="2" opacity="0.8"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#fff" stroke-width="2" opacity="0.8"/>
  </g>
  <text x="480" y="575" fill="#fff" font-size="18" font-weight="700">Synthesizer</text>
  <text x="480" y="595" fill="#fff" font-size="12" opacity="0.75">Unified Response</text>

  <!-- ============ EVALUATION BADGES (bottom strip) ============ -->
  <g transform="translate(195, 638)">
    <!-- Layer 1 -->
    <rect x="0" y="0" width="220" height="38" rx="19" fill="#2ecc71" opacity="0.12" stroke="#2ecc71" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="22" cy="19" r="10" fill="#2ecc71" opacity="0.25"/>
    <text x="22" y="23" fill="#2ecc71" font-size="12" font-weight="700" text-anchor="middle">1</text>
    <text x="42" y="23" fill="#2ecc71" font-size="12" font-weight="600">Built-in Scorers</text>

    <!-- Layer 2 -->
    <rect x="240" y="0" width="240" height="38" rx="19" fill="#f39c12" opacity="0.12" stroke="#f39c12" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="262" cy="19" r="10" fill="#f39c12" opacity="0.25"/>
    <text x="262" y="23" fill="#f39c12" font-size="12" font-weight="700" text-anchor="middle">2</text>
    <text x="282" y="23" fill="#f39c12" font-size="12" font-weight="600">Routing Accuracy</text>

    <!-- Layer 3 -->
    <rect x="500" y="0" width="260" height="38" rx="19" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="522" cy="19" r="10" fill="#e74c3c" opacity="0.25"/>
    <text x="522" y="23" fill="#e74c3c" font-size="12" font-weight="700" text-anchor="middle">3</text>
    <text x="542" y="23" fill="#e74c3c" font-size="12" font-weight="600">Agent-as-a-Judge</text>
  </g>

  <!-- Evaluation label -->
  <text x="55" y="663" fill="#fff" font-size="12" font-weight="600" opacity="0.4" letter-spacing="1.5">EVALUATION</text>

  <!-- Title bar at very top -->
  <text x="600" y="50" fill="#fff" font-size="13" font-weight="600" text-anchor="middle" opacity="0.35" letter-spacing="3">MULTI-AGENT SUPERVISOR PATTERN</text>

  <!-- Databricks + MLflow + LangGraph logos as text badges -->
  <g transform="translate(340, 62)">
    <rect x="0" y="0" width="100" height="22" rx="11" fill="#e94560" opacity="0.15"/>
    <text x="50" y="15" fill="#e94560" font-size="10" font-weight="600" text-anchor="middle">AgentBricks</text>
    <rect x="115" y="0" width="90" height="22" rx="11" fill="#2ecc71" opacity="0.15"/>
    <text x="160" y="15" fill="#2ecc71" font-size="10" font-weight="600" text-anchor="middle">MLflow 3.x</text>
    <rect x="220" y="0" width="100" height="22" rx="11" fill="#4fc3f7" opacity="0.15"/>
    <text x="270" y="15" fill="#4fc3f7" font-size="10" font-weight="600" text-anchor="middle">LangGraph</text>
    <rect x="335" y="0" width="85" height="22" rx="11" fill="#f5a623" opacity="0.15"/>
    <text x="377" y="15" fill="#f5a623" font-size="10" font-weight="600" text-anchor="middle">FEMA Data</text>
  </g>
</svg>
